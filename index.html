  <script>
    (function() {
      // 1. Check saved preference in localStorage
      var savedLang = localStorage.getItem('bf_lang');
      if (savedLang === 'jp' || savedLang === 'en' || savedLang === 'tw') {
        window.location.replace('./' + savedLang + '/index.html');
        return;
      }
      
      // 2. Detect browser language settings
      var browserLang = (navigator.language || navigator.userLanguage || 'ja').toLowerCase();
      if (browserLang.indexOf('zh') > -1) {
        window.location.replace('./tw/index.html');
      } else if (browserLang.indexOf('ja') > -1) {
        window.location.replace('./jp/index.html');
      } else if (browserLang.indexOf('en') > -1) {
        window.location.replace('./en/index.html');
      } else {
        // Default fallback to Japanese (Primary client target)
        window.location.replace('./jp/index.html');
      }
    })();
  </script>
